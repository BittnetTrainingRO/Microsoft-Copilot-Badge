<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Verification</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      padding: 40px 20px;
      margin: 0;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 720px;
      margin: auto;
      text-align: left;
    }

    .row {
      margin: 12px 0;
      line-height: 1.7;
      font-size: 18px;
    }

    .valid {
      color: #2e7d32;
      font-weight: bold;
      margin-top: 20px;
      font-size: 18px;
    }

    h1 {
      margin-top: 0;
    }

    a {
      color: #0a66c2;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Badge Verification</h1>

    <div class="row"><b>Status:</b> Valid</div>
    <div class="row"><b>Badge:</b> Microsoft Copilot Chat apmācības publiskajam sektoram | MS-4023</div>
    <div class="row"><b>Issued by:</b> Bittnet Training &amp; Microsoft</div>
    <div class="row"><b>Year:</b> 2026</div>
    <div class="row"><b>Certificate ID:</b> <span id="cert"></span></div>
    <div class="row">
      <b>Badge page:</b>
      <a href="https://bittnettrainingro.github.io/Microsoft-Copilot-Badge/">
        Open badge
      </a>
    </div>

    <p class="valid">
      This credential has been issued by Bittnet Training &amp; Microsoft and is currently valid.
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const certID = params.get("id") || "N/A";
    document.getElementById("cert").innerText = certID;
  </script>
</body>
</html>
